{{ $config := site.Params.giscus }}
{{ with $config }}
<script id="giscus" src="https://giscus.app/client.js"
  data-repo="{{ .repo }}"
  data-repo-id="{{ .repoID }}"
  data-category="{{ .category }}"
  data-category-id="{{ .categoryID }}"
  data-mapping="{{ .mapping }}"
  data-strict="{{- if .strict -}}1{{- else -}}0{{- end -}}"
  data-reactions-enabled="{{- if .reactions -}}1{{- else -}}0{{- end -}}"
  data-emit-metadata="{{- if .emitMetadata -}}1{{- else -}}0{{- end -}}"
  data-input-position="{{- if .inputOnTop -}}top{{- else -}}bottom{{- end -}}"
  data-theme="{{ .themes.light }}"
  data-lang="{{ site.Language.Locale }}"
  data-loading="lazy"
  crossorigin="anonymous"
  async>
</script>
<script>
  function sendMessage(message) {
    const iframe = document.querySelector('iframe.giscus-frame');
    if (!iframe) return;
    iframe.contentWindow.postMessage({ giscus: message }, 'https://giscus.app');
  }

  function setTheme() {
    let theme = this.window.document.querySelector('html').dataset.theme;
    if (theme === 'light') {
      sendMessage({ setConfig: { theme: '{{ .themes.light }}' }});
    } else {
      sendMessage({ setConfig: { theme: '{{ .themes.dark }}' }});
    }
  }

  // At first time the giscus retrive data
  // then it fires an event "message" to the parent window,
  // at this time we listen to the event and update the theme
  // to match the site's theme.
  window.addEventListener('message', () => {
    if (event.origin !== 'https://giscus.app') return;
    if (!(typeof event.data === 'object' && event.data.giscus)) return;
    setTheme();
  });

  // The "themeChanged" is a customized event defined in "themeControl.js".
  window.addEventListener('themeChanged', () => {
    setTheme();
  });
</script>
{{ end }}
