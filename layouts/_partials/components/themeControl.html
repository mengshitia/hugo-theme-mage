{{ $title := T "themeControl.title" }}
<button id="theme-control" title="{{ $title }}">
  <svg id="theme-icon" width="24" height="24" viewBox="-12 -12 24 24">
    <g class="clock hide">
      <radialGradient id="clock-panel-gradient" cx="0.2" cy="0.2" r="0.7">
        <stop offset="0" stop-color="#fff"></stop>
        <stop offset="1" stop-color="#bbb"></stop>
      </radialGradient>
      <radialGradient id="clock-border-gradient" cx="0.2" cy="0.2" r="0.3">
        <stop offset="0" stop-color="#59e3ff"></stop>
        <stop offset="1" stop-color="#0192e6"></stop>
      </radialGradient>
      <circle cx="0" cy="0" r="11" fill="url(#clock-panel-gradient)" stroke="url(#clock-border-gradient)" stroke-width="2"></circle>
      <circle id="clock-mark" cx="0" cy="-8" r="1" fill="#0173b9" stroke="none"></circle>
      <use href="#clock-mark" transform="rotate(90)"></use>
      <use href="#clock-mark" transform="rotate(180)"></use>
      <use href="#clock-mark" transform="rotate(270)"></use>
      <line class="clock-hour-hand" x1="0" y1="0" x2="0" y2="-4" stroke="#333" stroke-width="2" stroke-linecap="round" transform="rotate(240)"></line>
      <line class="clock-minute-hand" x1="0" y1="0" x2="0" y2="-6" stroke="#333" stroke-width="1.5" stroke-linecap="round"></line>
      <circle cx="0" cy="0" r="2" fill="#333" stroke="none"></circle>
    </g>
    <g class="sun hide">
      <radialGradient id="sun-gradient" cx="0.25" cy="0.25" r="0.5">
        <stop offset="0" stop-color="#ffff00"></stop>
        <stop offset="0.3" stop-color="#ffff00"></stop>
        <stop offset="1" stop-color="#ffa500"></stop>
      </radialGradient>
      <circle r="5" fill="url(#sun-gradient)" stroke="none"/>
      <line id="sun-light" x1="0" y1="10" x2="0" y2="9" stroke="#ffa500" stroke-width="2" stroke-linecap="round" />
      <use href="#sun-light" transform="rotate(45)" />
      <use href="#sun-light" transform="rotate(90)" />
      <use href="#sun-light" transform="rotate(135)" />
      <use href="#sun-light" transform="rotate(180)" />
      <use href="#sun-light" transform="rotate(225)" />
      <use href="#sun-light" transform="rotate(270)" />
      <use href="#sun-light" transform="rotate(315)" />
    </g>
    <g class="moon hide">
      <radialGradient id="moon-gradient" cx="0.2" cy="0.15" r="1">
        <stop offset="0" stop-color="#fff"></stop>
        <stop offset="0.5" stop-color="#ffff00"></stop>
        <stop offset="1" stop-color="#b46900"></stop>
      </radialGradient>
      <path d="M -10 4 A 10 10 0 1 0 4 -10 A 11 11 0 0 1 -10 4" fill="url(#moon-gradient)" />
    </g>
  </svg>
</button>
